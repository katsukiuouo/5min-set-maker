<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>5分セットメーカー</title>

  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/animation.css">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <div id="loadingOverlay" class="loading-overlay hidden">
    <div class="loading-card">
      <div class="loader"></div>
      <p>5分セットを作成しています...</p>
    </div>
  </div>

  <header class="hero">
    <div class="hero-inner">
      <h1>5分セットメーカー</h1>
      <p>リストに挟む5分の動画セットを作ろう！</p>
    </div>
  </header>

  <main class="container">
    <section class="glass-card">
      <h2 class="section-title">動画を追加</h2>

      <div class="tab-buttons">
        <button id="searchTab" class="tab-button active">検索</button>
        <button id="urlTab" class="tab-button">URL</button>
      </div>

      <div id="searchArea">
        <div class="search-row">
          <input type="text" id="searchInput" placeholder="動画を検索">
          <button id="searchButton">検索</button>
        </div>
        <div id="searchResults"></div>
      </div>

      <div id="urlArea" class="hidden">
        <div class="url-row">
          <input type="text" id="urlInput" placeholder="YouTube URL">
          <button id="urlButton">追加</button>
        </div>
      </div>
    </section>

    <section class="glass-card">
      <div class="section-header">
        <h2 class="section-title">使う動画にチェック✓</h2>
        <div class="candidate-buttons">
          <button id="checkAll">全てチェック</button>
          <button id="uncheckAll">全て解除</button>
        </div>
      </div>

      <div id="candidateList">
        <div class="empty">動画を追加するとここに表示されます</div>
      </div>
    </section>

    <section class="generate-area">
      <button id="generateButton" class="generate-button">
        5分セットを生成
      </button>
    </section>

    <section class="glass-card">
      <div class="section-header">
        <h2 class="section-title">あなたの作った5分セット！</h2>
      </div>

      <div id="resultList">
        <div class="empty">まだ生成されていません</div>
      </div>
    </section>
  </main>
<div class="footer-links">
  <a href="terms.html">利用規約</a>
  <span>｜</span>
  <a href="privacy.html">プライバシーポリシー</a>
</div>
  
  <footer>
    <p>© 5分セットメーカー</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>

  <script src="js/storage.js"></script>
  <script src="js/youtube.js"></script>
  <script src="js/algorithm.js"></script>
  <script src="js/share.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
